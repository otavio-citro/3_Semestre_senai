<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>doguinho</h2>
    <input type="text">
    <button onclick="carregarImagem()">Mostrar</button>

    <script>
        async function carregarImagem() {
            const id = document.getElementById('id').value
            const resposta = await fetch(`/dog/${id}`)
            const dados = await resposta.json()

            document.getElementById('dog').src = dados.url
        }
    </script>
    <img src="dog" alt="">

</body>
</html>
